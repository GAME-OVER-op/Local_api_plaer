name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  server:
    name: Rust-сервер (aarch64-linux-android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установить Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Установить Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Установить cargo-ndk
        run: cargo install cargo-ndk --locked

      # nttld/setup-ndk экспортирует ANDROID_NDK_HOME, cargo-ndk подхватит его автоматически.
      - name: Сборка релизного бинарника
        working-directory: server
        run: cargo ndk -t arm64-v8a -p 21 build --release

      - name: Выгрузить артефакт (бинарник)
        uses: actions/upload-artifact@v4
        with:
          name: media-server-aarch64
          path: server/target/aarch64-linux-android/release/media-server
          if-no-files-found: error

  app:
    name: Android APK (armeabi-v7a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Установить JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Установить Android SDK
        uses: android-actions/setup-android@v3

      - name: Настроить Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Сборка debug APK
        working-directory: app
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Выгрузить артефакт (APK)
        uses: actions/upload-artifact@v4
        with:
          name: tablet-player-apk
          path: app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
