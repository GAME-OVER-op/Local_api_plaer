name: build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Build (aarch64)
        run: cargo ndk -t arm64-v8a build --release
      - uses: actions/upload-artifact@v4
        with:
          name: media-server-aarch64
          path: server/target/aarch64-linux-android/release/media-server

  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Build APK
        run: gradle assembleRelease --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: tablet-player-apk
          path: app/app/build/outputs/apk/release/*.apk
